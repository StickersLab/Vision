<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1A0F3C">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Vision.</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1A0F3C;--bg2:#231555;--bg3:#2D1B69;--bg4:#3A2580;
  --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16);
  --text:#F0EDE8;--text2:rgba(240,237,232,0.58);--text3:rgba(240,237,232,0.28);
  --accent:#FCFF3B;--red:#F06080;--r:10px;--r2:16px;
  --card-bg:var(--bg2);--input-bg:var(--bg3)
}
.light{
  --bg:#F0EDF8;--bg2:#E8E2F5;--bg3:#DDD5F0;--bg4:#CFC5E8;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1A0F3C;--text2:rgba(26,15,60,0.65);--text3:rgba(26,15,60,0.35);
  --card-bg:#FFFFFF;--input-bg:#EDE8F8
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);transition:background .3s,color .3s}
*{scrollbar-width:none}*::-webkit-scrollbar{display:none}
.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 16px 24px;display:none}
.screen.active{display:block}
/* NAV */
.bnav{display:flex;background:var(--bg);border-top:0.5px solid var(--border);padding:10px 0 22px;flex-shrink:0}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--text3);transition:color .2s;padding:6px 0}
.nb.on{color:var(--accent)}
.nb-label{font-size:9px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;font-family:'DM Mono',monospace}
/* TOPBAR */
.topbar{padding:50px 0 0;display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px}
.logo{display:flex;align-items:center;gap:10px}
.app-name{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-1px}
.topbar-meta{font-size:10px;color:var(--text3);text-align:right;font-family:'DM Mono',monospace;line-height:1.7}
.theme-btn{background:var(--bg3);border:0.5px solid var(--border2);border-radius:100px;padding:5px 10px;font-size:14px;cursor:pointer;transition:all .2s}
/* CARDS */
.card{background:var(--card-bg);border:0.5px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:10px}
.slabel{font-size:9px;font-weight:500;letter-spacing:.14em;color:var(--text3);text-transform:uppercase;margin-bottom:10px;font-family:'DM Mono',monospace}
.accent-line{width:28px;height:2px;background:var(--accent);border-radius:1px;margin-bottom:5px}
/* BARS */
.xpbar{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.xpfill{height:100%;border-radius:2px;transition:width .5s}
/* METRICS */
.mg2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.mc{background:var(--bg3);border-radius:var(--r);padding:14px;border:0.5px solid var(--border)}
.mv{font-family:'Syne',sans-serif;font-size:22px;font-weight:700}
.ml{font-size:10px;color:var(--text3);margin-top:3px;font-family:'DM Mono',monospace}
/* STREAK */
.streak-row{display:flex;gap:5px;margin-bottom:16px}
.sday{flex:1;background:var(--bg3);border-radius:8px;padding:8px 4px;text-align:center;border:0.5px solid var(--border)}
.sday.done{background:rgba(252,255,59,.1);border-color:rgba(252,255,59,.3)}
.sday.today{background:rgba(252,255,59,.18);border-color:var(--accent)}
.sdl{font-size:8px;color:var(--text3);display:block;margin-bottom:4px;font-weight:600;font-family:'DM Mono',monospace}
.sdi{font-size:12px;font-weight:700;color:var(--text3)}
.sday.done .sdi,.sday.today .sdi{color:var(--accent)}
/* MODULE GRID */
.mod-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.mod-card{background:var(--card-bg);border:0.5px solid var(--border);border-radius:var(--r2);padding:14px;cursor:pointer;transition:all .15s}
.mod-card:active{opacity:.7;transform:scale(.97)}
.mod-card.done{border-color:rgba(252,255,59,.3)}
.mod-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.mod-pct{font-size:10px;font-weight:700;color:var(--text3);font-family:'DM Mono',monospace}
.mod-card.done .mod-pct{color:var(--accent)}
.mod-name{font-size:12px;font-weight:500;margin-bottom:8px;color:var(--text2)}
.mod-bar{height:2px;background:var(--bg4);border-radius:1px;overflow:hidden}
.mod-fill{height:100%;border-radius:1px}
/* CHECKS */
.ci{display:flex;align-items:flex-start;gap:12px;padding:12px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);cursor:pointer;margin-bottom:6px;transition:all .15s}
.ci.ck{background:rgba(252,255,59,.13);border-color:rgba(252,255,59,.4)}
.ci:active{opacity:.7}
.cb{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--bg4)}
.ci.ck .cb{background:var(--accent);border-color:var(--accent)}
.ct{font-size:13px;color:var(--text2);flex:1;line-height:1.4}
.ci.ck .ct{color:var(--bg);font-weight:500}
.cx{font-size:9px;color:var(--text3);flex-shrink:0;margin-top:3px;font-weight:600;font-family:'DM Mono',monospace}
.ci.ck .cx{color:rgba(26,15,60,.5)}
/* EDIT */
.edit-btn{background:var(--bg3);border:0.5px solid var(--border2);border-radius:100px;padding:5px 12px;font-size:10px;font-weight:500;color:var(--text2);cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:.05em;transition:all .15s}
.edit-btn.on{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.edit-item{display:flex;align-items:center;gap:8px;padding:8px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);margin-bottom:6px}
.edit-input{flex:1;background:transparent;border:none;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;outline:none}
.del-btn{width:22px;height:22px;border-radius:5px;background:rgba(240,96,128,.2);border:none;cursor:pointer;color:#F06080;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.add-btn{width:100%;padding:10px;background:rgba(252,255,59,.08);border:0.5px dashed rgba(252,255,59,.3);border-radius:var(--r);color:var(--accent);font-size:11px;font-weight:500;cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:.05em;margin-top:4px}
.back-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:22px;padding:0;margin-right:8px;line-height:1}
/* TABS */
.tabs{display:flex;gap:4px;background:var(--bg3);padding:4px;border-radius:var(--r);margin-bottom:16px}
.tab{flex:1;padding:8px 4px;font-size:10px;font-weight:500;border:none;background:transparent;color:var(--text3);border-radius:8px;cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:.04em;transition:all .15s}
.tab.on{background:var(--bg4);color:var(--text);border:0.5px solid var(--border2)}
/* TIMELINE */
.tli{display:flex;gap:10px;margin-bottom:6px}
.tlt{font-size:9px;font-weight:500;color:var(--text3);width:38px;flex-shrink:0;padding-top:12px;font-family:'DM Mono',monospace}
.tlc{flex:1;background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--r);padding:10px 12px;cursor:pointer;transition:all .15s}
.tlc.ck{background:rgba(252,255,59,.1);border-color:rgba(252,255,59,.3)}
.tln{font-size:13px;font-weight:500;color:var(--text2)}
.tlc.ck .tln{color:var(--text)}
.tls{font-size:11px;color:var(--text3);margin-top:2px}
.tl-edit-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.tl-time-in{width:46px;background:var(--bg4);border:0.5px solid var(--border2);border-radius:6px;padding:5px;color:var(--text);font-size:10px;font-family:'DM Mono',monospace;text-align:center;outline:none}
.tl-label-in{flex:1;background:var(--bg3);border:0.5px solid var(--border2);border-radius:6px;padding:6px 10px;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;outline:none}
/* WATER */
.glass-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.gl{width:38px;height:38px;border-radius:var(--r);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;background:var(--bg3);transition:all .15s}
.gl.on{background:rgba(91,184,245,.15);border-color:rgba(91,184,245,.4)}
/* SPORT */
.muscle-group{background:var(--card-bg);border:0.5px solid var(--border);border-radius:var(--r2);margin-bottom:8px;overflow:hidden}
.mgh{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.mgh-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.mgh-title{font-size:13px;font-weight:500;flex:1}
.mgh-count{font-size:10px;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace}
.mgh-recent{font-size:9px;color:#F06080;font-weight:600;font-family:'DM Mono',monospace}
.mgh-chev{font-size:10px;color:var(--text3);transition:transform .2s;margin-left:auto}
.mgh-chev.open{transform:rotate(180deg)}
.mgb{display:none;padding:0 14px 12px;border-top:0.5px solid var(--border)}
.mgb.open{display:block}
.exo-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border);cursor:pointer}
.exo-item:last-child{border-bottom:none}
.exo-cb{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border2);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;background:var(--bg4)}
.exo-item.sel .exo-cb{background:var(--accent);border-color:var(--accent)}
.exo-name{font-size:13px;font-weight:500;color:var(--text2)}
.exo-item.sel .exo-name{color:var(--text)}
.exo-meta{font-size:10px;color:var(--text3);margin-top:2px;font-family:'DM Mono',monospace}
.exo-tip{font-size:10px;color:var(--text3);font-style:italic;margin-top:2px}
/* GO NOW */
.gonow{background:rgba(252,255,59,.07);border:1px solid rgba(252,255,59,.2);border-radius:var(--r2);padding:16px;margin-bottom:16px}
.gonow-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--accent);margin-bottom:12px}
.gonow-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:0.5px solid rgba(252,255,59,.12)}
.gonow-item:last-of-type{border-bottom:none}
.gonow-num{width:22px;height:22px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--bg);flex-shrink:0}
.gonow-name{font-size:13px;font-weight:500}
.gonow-sets{font-size:10px;color:rgba(252,255,59,.6);margin-top:2px;font-family:'DM Mono',monospace}
.start-btn{width:100%;padding:14px;background:var(--accent);border:none;border-radius:var(--r);font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--bg);cursor:pointer;margin-top:10px;transition:opacity .2s}
.start-btn:disabled{opacity:.3;cursor:not-allowed}
.need-more{font-size:11px;color:var(--text3);text-align:center;padding:8px 0;font-family:'DM Mono',monospace}
/* TIMER */
.timer-box{background:var(--bg3);border-radius:var(--r2);padding:20px;text-align:center;margin-bottom:16px;border:1px solid var(--border2)}
.timer-phase{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:8px}
.timer-phase.exo{color:var(--accent)}
.timer-phase.pause{color:#F0A050}
.timer-display{font-family:'Syne',sans-serif;font-size:56px;font-weight:800;color:var(--text);line-height:1;margin-bottom:12px}
.timer-progress{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-bottom:16px}
.timer-progress-fill{height:100%;border-radius:3px;transition:width .1s}
.timer-controls{display:flex;gap:8px;justify-content:center}
.timer-btn{padding:10px 20px;border-radius:var(--r);border:none;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.timer-btn.primary{background:var(--accent);color:var(--bg)}
.timer-btn.secondary{background:var(--bg4);color:var(--text)}
.timer-settings{display:flex;gap:8px;margin-bottom:12px}
.timer-setting{flex:1;background:var(--bg4);border-radius:var(--r);padding:10px;text-align:center;border:0.5px solid var(--border)}
.timer-setting label{display:block;font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:.06em;margin-bottom:4px}
.timer-setting input{width:100%;background:transparent;border:none;color:var(--accent);font-size:18px;font-family:'Syne',sans-serif;font-weight:700;text-align:center;outline:none}
/* WEIGHT */
.weight-card{background:var(--card-bg);border:0.5px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:10px}
.weight-num{font-family:'Syne',sans-serif;font-size:42px;font-weight:800;color:var(--accent);line-height:1}
.weight-delta{font-size:12px;font-weight:600;padding:3px 8px;border-radius:100px;font-family:'DM Mono',monospace}
.weight-input-row{display:flex;gap:8px;margin-top:10px}
.weight-in{flex:1;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);padding:10px 12px;color:var(--text);font-size:16px;font-family:'Syne',sans-serif;font-weight:700;outline:none;text-align:center}
.weight-save{padding:10px 16px;background:var(--accent);border:none;border-radius:var(--r);font-family:'Syne',sans-serif;font-size:12px;font-weight:800;color:var(--bg);cursor:pointer}
/* HABIT STREAK */
.streak-habit{background:var(--card-bg);border:0.5px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:10px}
.sh-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sh-streak{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--accent)}
.sh-days{display:flex;gap:4px}
.sh-day{flex:1;background:var(--bg3);border-radius:8px;padding:8px 4px;text-align:center;border:0.5px solid var(--border);cursor:pointer}
.sh-day.done{background:rgba(252,255,59,.1);border-color:rgba(252,255,59,.3)}
.sh-day.today{border-color:var(--accent)}
.sh-day span{display:block;font-size:8px;color:var(--text3);font-family:'DM Mono',monospace}
.sh-day .sh-di{font-size:11px;font-weight:700;color:var(--text3);margin-top:2px}
.sh-day.done .sh-di{color:var(--accent)}
/* DAY PROGRESS */
.day-progress{background:var(--card-bg);border:0.5px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:10px}
.dp-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.dp-score{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--accent)}
.dp-max{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace}
.dp-bar{height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;margin-bottom:6px}
.dp-fill{height:100%;border-radius:4px;background:var(--accent);transition:width .5s}
.dp-remaining{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
/* NOTIF */
.notif-card{background:var(--bg3);border-radius:var(--r2);padding:14px;margin-bottom:8px;border:0.5px solid var(--border)}
.notif-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border)}
.notif-row:last-child{border-bottom:none}
.notif-label{flex:1;font-size:13px;color:var(--text2)}
.notif-time{background:var(--bg4);border:0.5px solid var(--border2);border-radius:6px;padding:4px 8px;color:var(--text);font-size:12px;font-family:'DM Mono',monospace;outline:none;width:70px;text-align:center}
.notif-toggle{width:36px;height:20px;border-radius:10px;background:var(--bg4);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.notif-toggle.on{background:var(--accent)}
.notif-toggle::after{content:'';position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform .2s}
.notif-toggle.on::after{transform:translateX(16px)}
/* HEATMAP */
.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px}
.hm-cell{aspect-ratio:1;border-radius:3px;cursor:default}
.hm-day-label{font-size:8px;color:var(--text3);text-align:center;font-family:'DM Mono',monospace;margin-bottom:4px}
/* BARS */
.wbr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.wbl{font-size:11px;color:var(--text3);width:80px;flex-shrink:0}
.wb{flex:1;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.wbf{height:100%;border-radius:3px}
.wbv{font-size:10px;font-weight:600;color:var(--text2);width:28px;text-align:right;flex-shrink:0;font-family:'DM Mono',monospace}
/* MISC */
.badge{font-size:10px;padding:4px 10px;border-radius:100px;border:0.5px solid var(--border2);color:var(--text2);display:inline-block;margin:3px;font-family:'DM Mono',monospace}
.lvl-pill{display:inline-flex;align-items:center;background:rgba(252,255,59,.1);border:0.5px solid rgba(252,255,59,.25);border-radius:100px;padding:4px 12px;font-size:10px;font-weight:600;color:var(--accent);margin-bottom:10px;font-family:'DM Mono',monospace;letter-spacing:.05em}
.info-box{background:var(--bg3);border-radius:var(--r);padding:12px;font-size:12px;color:var(--text3);line-height:1.6;margin-bottom:14px;border-left:2px solid var(--border2)}
.next-badge{display:flex;align-items:center;gap:10px;padding-bottom:12px;margin-bottom:12px;border-bottom:0.5px solid var(--border)}
.next-badge:last-child{border:none;padding:0;margin:0}
.copy-btn{width:100%;padding:12px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);color:var(--accent);font-size:11px;font-weight:500;cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:.05em;margin-top:8px;transition:all .2s}
.copy-btn.copied{background:rgba(252,255,59,.15);border-color:rgba(252,255,59,.4)}
.fitem{background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);padding:10px;cursor:pointer;display:flex;align-items:flex-start;gap:8px;transition:all .15s;margin-bottom:6px}
.fitem.ck{background:rgba(252,255,59,.1);border-color:rgba(252,255,59,.3)}
.fcb{width:14px;height:14px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;background:var(--bg4)}
.fitem.ck .fcb{background:var(--accent);border-color:var(--accent)}
.fn{font-size:12px;font-weight:500;color:var(--text2)}
.fitem.ck .fn{color:var(--bg);font-weight:600}
.fq{font-size:10px;color:var(--text3)}
.fw2{font-size:10px;color:var(--text3);font-style:italic}
.smcard{background:var(--bg3);border-radius:var(--r);padding:14px;margin-bottom:8px;border-left:3px solid var(--accent)}
.smt{font-size:13px;font-weight:500;margin-bottom:4px}
.smk{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;font-family:'DM Mono',monospace}
.smi{font-size:12px;color:var(--text3);line-height:1.9}
.smi b{color:var(--text);font-weight:500}
/* ONBOARDING */
.onboard{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
.onboard h1{font-family:'Syne',sans-serif;font-size:40px;font-weight:800;color:var(--accent);margin-bottom:8px;letter-spacing:-1px}
.onboard p{font-size:14px;color:var(--text2);text-align:center;margin-bottom:32px;line-height:1.6}

// ── AUDIO ────────────────────────────────────────────────────────────────────
let AC=null;try{AC=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}
function beep(freq=880, dur=0.15, type='sine'){
  try{
    if(!AC)return
    const o=AC.createOscillator(), g=AC.createGain()
    o.connect(g);g.connect(AC.destination)
    o.frequency.value=freq;o.type=type
    g.gain.setValueAtTime(0.3,AC.currentTime)
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur)
    o.start();o.stop(AC.currentTime+dur)
  }catch(e){}
}
function beepStart(){beep(660,.1);setTimeout(()=>beep(880,.15),120)}
function beepEnd(){beep(440,.1);setTimeout(()=>beep(330,.2),120)}

function modPct(id){
  const m=ST.mods.find(x=>x.id===id);if(!m)return 0
  const d=m.checks.filter((_,i)=>ST.checks[`${id}_${i}`]).length
  return Math.round(d/m.checks.length*100)
}
function xpToday(){
  let x=0
  ST.mods.forEach(m=>m.checks.forEach((c,i)=>{if(ST.checks[`${m.id}_${i}`])x+=m.xps[i]||10}))
  ST.routine.morning.forEach((ri,i)=>{if(ST.rchecks[`m_${i}`])x+=ri.xp})
  ST.routine.evening.forEach((ri,i)=>{if(ST.rchecks[`e_${i}`])x+=ri.xp})
  x+=ST.sportDone.length*15
  return x
}
function maxXpDay(){
  let x=0
  ST.mods.forEach(m=>m.xps.forEach(xp=>x+=xp))
  ST.routine.morning.forEach(ri=>x+=ri.xp)
  ST.routine.evening.forEach(ri=>x+=ri.xp)
  return x
}
function recentMuscles(){
  const res=[]
  for(let d=1;d<=2;d++){
    const dt=new Date();dt.setDate(dt.getDate()-d)
    const k=`${dt.getFullYear()}-${dt.getMonth()}-${dt.getDate()}`
    if(ST.sportHist[k])res.push(...ST.sportHist[k])
  }
  return[...new Set(res)]
}
function todayDays(){
  const labels=['D','L','M','M','J','V','S']
  const today=new Date().getDay()
  return labels.map((l,i)=>({l,done:i<today,today:i===today}))
}
function calcStreak(){
  const now=new Date()
  const key=d=>{const dt=new Date(now);dt.setDate(dt.getDate()-d);return`${dt.getFullYear()}-${dt.getMonth()}-${dt.getDate()}`}
  // Si aujourd'hui a 0 XP on regarde si hier avait du score (streak en cours)
  let start=0
  if(!(ST.scores[key(0)]>0)){
    if(ST.scores[key(1)]>0)start=1
    else return 0
  }
  let streak=0
  for(let d=start;d<365;d++){
    if((ST.scores[key(d)]||0)>0)streak++
    else break
  }
  return streak
}
function currentWeight(){return ST.weights.length?ST.weights[ST.weights.length-1]:null}
function weightDelta(){
  if(ST.weights.length<2)return null
  return ST.weights[ST.weights.length-1].v-ST.weights[ST.weights.length-2].v
}

function checkOnboard(){
  if(!ST.name){
    document.getElementById('onboard').style.display='flex'
  }
}
function validateObEmail(){
  const el=document.getElementById('ob-email')
  const err=document.getElementById('ob-email-err')
  if(!el||!err)return true
  const v=el.value.trim()
  const valid=!v||/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)
  el.style.borderColor=v?(valid?'var(--accent)':'#F06080'):'var(--border2)'
  err.style.display=(v&&!valid)?'block':'none'
  return valid
}
function finishOnboard(){
  const name=document.getElementById('ob-name').value.trim()
  const email=document.getElementById('ob-email').value.trim()
  const weight=parseFloat(document.getElementById('ob-weight').value)
  const goal=parseFloat(document.getElementById('ob-goal').value)
  if(!name){
    const ni=document.getElementById('ob-name');if(ni)ni.style.borderColor='#F06080'
    return
  }
  if(!email){
    const ei=document.getElementById('ob-email');if(ei)ei.style.borderColor='#F06080'
    const err=document.getElementById('ob-email-err');if(err){err.textContent='L\'email est obligatoire';err.style.display='block'}
    return
  }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    validateObEmail()
    return
  }
  ST.name=name
  ST.email=email
  if(!isNaN(goal)&&goal>30)ST.weightGoal=goal
  if(!isNaN(weight)&&weight>30){
    const date=new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})
    ST.weights=[{v:weight,date}]
  }
  persist()
  document.getElementById('onboard').style.display='none'
  r()
}

let _notifInterval=null
function requestNotifs(){
  if(!('Notification' in window)){alert('Les notifications ne sont pas supportées sur ce navigateur.');return}
  if(Notification.permission==='granted'){
    _startNotifInterval()
    renderHist()
    return
  }
  if(Notification.permission==='denied'){
    alert('Les notifications sont bloquées. Va dans les réglages de ton navigateur pour les autoriser pour ce site.')
    return
  }
  Notification.requestPermission().then(p=>{
    if(p==='granted'){_startNotifInterval();renderHist()}
    else alert('Permission refusée — les rappels ne pourront pas s\'activer.')
  })
}
function _startNotifInterval(){
  if(_notifInterval)return  // déjà démarré
  _notifInterval=setInterval(()=>{
    if(Notification.permission!=='granted')return
    const now=new Date()
    const hm=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`
    if(ST.notifs.wake.on&&ST.notifs.wake.time===hm)
      new Notification('Vision. ☀️',{body:`Réveil ${ST.name} ! Commence ta routine matin.`,icon:'V..png'})
    if(ST.notifs.sport.on&&ST.notifs.sport.time===hm)
      new Notification('Vision. ⚡',{body:"Heure de la muscu ! Change-toi avant de t'asseoir.",icon:'V..png'})
    if(ST.notifs.water.on&&ST.notifs.water.time===hm)
      new Notification('Vision. 💧',{body:"Rappel hydratation — bois un verre d'eau.",icon:'V..png'})
    // Notification ongles automatique à 21h00 chaque soir
    if(hm==='21:00'){
      const todayIdx=new Date().getDay()
      // Enregistre qu'on a envoyé la notif aujourd'hui
      const nailNotifKey=`v3_nail_notif_${tk}`
      if(!load(nailNotifKey,false)){
        sv(nailNotifKey,true)
        if(Notification.permission==='granted')
          new Notification('Vision. 💅',{body:'Tu t\'es rongé les ongles aujourd\'hui ?',icon:'V..png'})
        // Marque le popup à afficher au prochain focus de l'app
        sv('v3_nail_popup',true)
      }
    }
  },60000)
}

  const todayIdx=new Date().getDay()
  ST.nailStreak.days=ST.nailStreak.days||{}
  if(!didBite){
    // N'a pas rongé → coche le jour
    ST.nailStreak.days[todayIdx]=true
  } else {
    // A rongé → marque comme échoué (false = case rouge)
    ST.nailStreak.days[todayIdx]=false
  }
  // Recalcule le streak (jours consécutifs vrais)
  let count=0
  const labels=[0,1,2,3,4,5,6]
  for(let i=todayIdx;i>=0;i--){
    if(ST.nailStreak.days[i]===true)count++
    else break
  }
  ST.nailStreak.count=count
  persist()
  const el=document.getElementById('nail-popup')
  if(el)el.remove()
  _nailPopupActive=false
  if(ST.screen==='home')renderHome()
}

// ── TIMER ─────────────────────────────────────────────────────────────────────
function timerTick(){
  ST.timerLeft--
  if(ST.timerLeft<=3&&ST.timerLeft>0)beepTick()
  if(ST.timerLeft<=0){
    if(ST.timerPhase==='exo'){
      ST.timerPhase='pause';ST.timerLeft=ST.timerPause;beepEnd()
    } else {
      ST.timerPhase='exo';ST.timerLeft=ST.timerExo;beepStart()
    }
  }
  renderTimerOnly()
}
function startFreshTimer(){
  if(ST.timerRunning)return
  try{AC.resume()}catch(e){}
  ST.timerRunning=true
  ST.timerPhase='exo'
  ST.timerLeft=ST.timerExo
  beepStart()
  if(ST.timerInterval){clearInterval(ST.timerInterval);ST.timerInterval=null}
  ST.timerInterval=setInterval(timerTick,1000)
  renderSport()
}
function resumeTimer(){
  if(ST.timerRunning)return
  try{AC.resume()}catch(e){}
  ST.timerRunning=true
  // timerLeft et timerPhase gardent leur valeur actuelle — pas de reset
  if(ST.timerInterval){clearInterval(ST.timerInterval);ST.timerInterval=null}
  ST.timerInterval=setInterval(timerTick,1000)
  renderSport()
}
function pauseTimer(){
  if(ST.timerInterval){clearInterval(ST.timerInterval);ST.timerInterval=null}
  ST.timerRunning=false
  renderSport()
}
function stopTimer(){
  if(ST.timerInterval){clearInterval(ST.timerInterval);ST.timerInterval=null}
  ST.timerRunning=false;ST.timerLeft=ST.timerExo;ST.timerPhase='exo'
  renderSport()
}
function renderTimerOnly(){
  const disp=document.getElementById('timer-display')
  const prog=document.getElementById('timer-prog')
  const phase=document.getElementById('timer-phase')
  if(!disp)return
  const total=ST.timerPhase==='exo'?ST.timerExo:ST.timerPause
  const pct=Math.round((1-ST.timerLeft/total)*100)
  const m=Math.floor(ST.timerLeft/60),s=ST.timerLeft%60
  disp.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
  if(prog)prog.style.width=pct+'%'
  if(phase){phase.textContent=ST.timerPhase==='exo'?'EXERCICE ⚡':'PAUSE 😮‍💨';phase.className='timer-phase '+(ST.timerPhase==='exo'?'exo':'pause')}
}

let _libOpen=false
function toggleLibMod(id){
  const idx=ST.mods.findIndex(m=>m.id===id)
  if(idx>=0){

  } else {

    if(lib)ST.mods.push({...lib})

  persist()
  r()
}

// ── RENDER HISTORIQUE ─────────────────────────────────────────────────────────
function renderHist(){
  // Build 30-day heatmap
  const cells=[]
  for(let d=29;d>=0;d--){
    const dt=new Date();dt.setDate(dt.getDate()-d)
    const k=`${dt.getFullYear()}-${dt.getMonth()}-${dt.getDate()}`
    const score=ST.scores[k]||0
    const max=maxXpDay()||1
    const pct=Math.min(score/max,1)
    const isToday=d===0
    let bg
    if(score===0)bg='var(--bg4)'
    else if(pct<0.3)bg='rgba(252,255,59,0.2)'
    else if(pct<0.6)bg='rgba(252,255,59,0.5)'
    else if(pct<0.9)bg='rgba(252,255,59,0.8)'
    else bg='var(--accent)'
    cells.push({bg,score,label:dt.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'}),isToday})
  }
  const heatHtml=`<div class="heatmap">${cells.map(c=>`<div class="hm-cell" style="background:${c.bg};${c.isToday?'border:1.5px solid var(--accent)':''}" title="${c.label}: ${c.score} XP"></div>`).join('')}</div>
  <div style="display:flex;gap:6px;align-items:center;margin-bottom:16px;font-size:10px;color:var(--text3);font-family:'DM Mono',monospace">
    <div style="width:10px;height:10px;border-radius:2px;background:var(--bg4)"></div><span>0</span>
    <div style="width:10px;height:10px;border-radius:2px;background:rgba(252,255,59,0.3)"></div><span>&lt;30%</span>
    <div style="width:10px;height:10px;border-radius:2px;background:rgba(252,255,59,0.6)"></div><span>&lt;60%</span>
    <div style="width:10px;height:10px;border-radius:2px;background:rgba(252,255,59,0.9)"></div><span>&lt;90%</span>
    <div style="width:10px;height:10px;border-radius:2px;background:var(--accent)"></div><span>100%</span>
  </div>`

  // Weight chart
  const wHtml=ST.weights.length>1?`<div class="slabel">COURBE DE POIDS</div>
  <div class="card" style="margin-bottom:16px">
    <div style="display:flex;align-items:flex-end;gap:4px;height:80px;margin-bottom:8px">
      ${(()=>{const ws=ST.weights.slice(-14);const min=Math.min(...ws.map(w=>w.v))-1;const max=Math.max(...ws.map(w=>w.v))+1;const range=max-min||1
      return ws.map((w,i)=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
        <div style="width:100%;background:${i===ws.length-1?'var(--accent)':'rgba(252,255,59,0.4)'};border-radius:2px 2px 0 0;height:${Math.round(((w.v-min)/range)*70)+5}px"></div>
        <div style="font-size:7px;color:var(--text3);font-family:'DM Mono',monospace">${w.date}</div>
      </div>`).join('')})()}
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);font-family:'DM Mono',monospace">
      <span>Départ: ${ST.weights[0]?.v}kg</span>
      <span>Actuel: ${ST.weights[ST.weights.length-1]?.v}kg</span>
      <span>Objectif: ${ST.weightGoal}kg</span>
    </div>
  </div>`:'<div class="info-box">Commence à peser pour voir ta courbe de progression.</div>'

  // Notifs
  const notifHtml=`<div class="slabel">RAPPELS & NOTIFICATIONS</div>
  <div class="notif-card">
    <div class="notif-row">
      <span class="notif-label">☀️ Réveil matin</span>
      <input class="notif-time" type="time" value="${ST.notifs.wake.time}" onchange="updNotif('wake','time',this.value)"/>
      <button class="notif-toggle${ST.notifs.wake.on?' on':''}" onclick="togNotif('wake')"></button>
    </div>
    <div class="notif-row">
      <span class="notif-label">⚡ Rappel sport soir</span>
      <input class="notif-time" type="time" value="${ST.notifs.sport.time}" onchange="updNotif('sport','time',this.value)"/>
      <button class="notif-toggle${ST.notifs.sport.on?' on':''}" onclick="togNotif('sport')"></button>
    </div>
    <div class="notif-row">
      <span class="notif-label">💧 Rappel hydratation</span>
      <input class="notif-time" type="time" value="${ST.notifs.water.time}" onchange="updNotif('water','time',this.value)"/>
      <button class="notif-toggle${ST.notifs.water.on?' on':''}" onclick="togNotif('water')"></button>
    </div>
  </div>
  <button onclick="requestNotifs()" style="width:100%;padding:12px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);color:var(--accent);font-size:11px;font-weight:500;cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:.05em;margin-top:4px">
    🔔 ACTIVER LES NOTIFICATIONS
  </button>`

  document.getElementById('s-hist').innerHTML=`
  <div class="topbar"><div><div class="accent-line"></div><div class="app-name" style="font-size:22px">Historique</div></div><div class="topbar-meta">30 JOURS<br>DE DONNÉES</div></div>
  <div class="slabel">HEATMAP — 30 DERNIERS JOURS</div>
  ${heatHtml}${wHtml}${notifHtml}`
}

// ── RENDER DASH ───────────────────────────────────────────────────────────────
function renderDash(){
  const totalXp=computeTotalXp(),lvl=getLevel(totalXp)
  const streak=calcStreak()
  const sportSessions=Object.keys(ST.sportHist).length
  const nailCount=ST.nailStreak.count

  // Piliers réels (taux de completion aujourd'hui)
  const week=ST.mods.map(m=>({n:m.name,p:modPct(m.id),c:m.color}))
  const avg=week.length>0?Math.round(week.reduce((a,w)=>a+w.p,0)/week.length):0

  // Objectifs calculés depuis les vraies données
  const wCurrent=ST.weights.length?ST.weights[ST.weights.length-1].v:null
  const wStart=ST.weights.length?ST.weights[0].v:null
  const objs=[]
  if(wCurrent!==null&&wStart!==null&&ST.weightGoal){
    const wRange=ST.weightGoal-wStart||1
    const wPct=Math.min(Math.max(Math.round(((wCurrent-wStart)/wRange)*100),0),100)
    objs.push({l:'Objectif de poids',t:`${wStart}kg → ${ST.weightGoal}kg (actuel : ${wCurrent}kg)`,p:wPct,c:'#B8A0F8'})
  }
  objs.push({l:'Streak journalier',t:`${streak} jour${streak>1?'s':''} consécutifs (objectif 30j)`,p:Math.min(Math.round((streak/30)*100),100),c:'#F0A050'})
  objs.push({l:'Streak ongles 90j',t:`${nailCount}/90 jours sans ronger`,p:Math.min(Math.round((nailCount/90)*100),100),c:'#F472B6'})
  objs.push({l:'Séances sport',t:`${sportSessions}/30 séances effectuées`,p:Math.min(Math.round((sportSessions/30)*100),100),c:'#8BE8C8'})

  // Badges débloqués sur vraies données uniquement
  const bdone=[]
  if(totalXp>0)bdone.push('⚡ Compte activé')
  if(streak>=3)bdone.push('🔥 3 jours de streak')
  if(streak>=7)bdone.push('🏆 7 jours de streak')
  if(streak>=30)bdone.push('💎 30 jours de streak')
  if(sportSessions>=1)bdone.push('💪 Première séance sport')
  if(sportSessions>=10)bdone.push('🏋️ 10 séances sport')
  if(nailCount>=7)bdone.push('💅 Ongles 7 jours')
  if(nailCount>=30)bdone.push('💅 Ongles 30 jours')
  if(nailCount>=90)bdone.push('👑 Ongles 90 jours')
  if(ST.mods.some(m=>modPct(m.id)===100))bdone.push('🌟 Module complet')
  if(totalXp>=500)bdone.push('⭐ 500 XP')
  if(totalXp>=1500)bdone.push('⭐⭐ 1500 XP')
  if(totalXp>=5000)bdone.push('⭐⭐⭐ 5000 XP')

  // Prochains badges (uniquement ceux non encore atteints)
  const allBadges=[
    {ic:'🔥',l:'Streak 7 jours',cur:streak,total:7},
    {ic:'🔥',l:'Streak 30 jours',cur:streak,total:30},
    {ic:'💪',l:'10 séances sport',cur:sportSessions,total:10},
    {ic:'💪',l:'30 séances sport',cur:sportSessions,total:30},
    {ic:'💅',l:'Ongles 30 jours',cur:nailCount,total:30},
    {ic:'💅',l:'Ongles 90 jours',cur:nailCount,total:90},
    {ic:'⭐',l:'500 XP',cur:totalXp,total:500},
    {ic:'⭐',l:'1500 XP',cur:totalXp,total:1500},
    {ic:'⭐',l:'5000 XP',cur:totalXp,total:5000},
  ]
  const bnext=allBadges.filter(b=>b.cur<b.total).slice(0,5)
    .map(b=>({...b,p:`${Math.min(b.cur,b.total)}/${b.total}`,pct:Math.round((b.cur/b.total)*100)}))

  document.getElementById('s-dash').innerHTML=`
  <div class="topbar"><div><div class="accent-line"></div><div class="app-name" style="font-size:22px">Stats</div></div><div class="topbar-meta">DONNÉES<br>RÉELLES</div></div>
  <div class="card" style="text-align:center;margin-bottom:16px">
    <div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:4px">NIVEAU ACTUEL</div>
    <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--accent)">${lvl.num}. ${lvl.name}</div>
    <div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:4px">${totalXp} XP total${lvl.next?` · ${lvl.next-totalXp} XP vers NIV.${lvl.num+1}`:' · MAX 🏆'}</div>
  </div>
  <div class="mg2">
    <div class="mc"><div class="mv">${avg}%</div><div class="ml">SCORE JOUR</div></div>
    <div class="mc"><div class="mv">${streak} 🔥</div><div class="ml">STREAK</div></div>
    <div class="mc"><div class="mv">NIV.${lvl.num}</div><div class="ml">${lvl.name.toUpperCase()}</div></div>
    <div class="mc"><div class="mv">${totalXp}</div><div class="ml">XP TOTAL</div></div>
  </div>
  <div class="slabel">PILIERS — AUJOURD'HUI</div>
  <div class="card" style="margin-bottom:16px">${week.length>0?week.map(w=>`<div class="wbr"><span class="wbl" style="font-size:10px">${w.n}</span><div class="wb"><div class="wbf" style="width:${w.p}%;background:${w.c}"></div></div><span class="wbv">${w.p}%</span></div>`).join(''):'<div style="font-size:12px;color:var(--text3);text-align:center;padding:8px">Active des piliers pour voir ta progression</div>'}</div>
  <div class="slabel">OBJECTIFS EN COURS</div>
  <div class="card" style="margin-bottom:16px">${objs.map((o,i)=>`<div style="${i<objs.length-1?'margin-bottom:14px':''}">
    <div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:13px;font-weight:500">${o.l}</span><span style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace">${o.p}%</span></div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:6px">${o.t}</div>
    <div class="xpbar"><div class="xpfill" style="width:${o.p}%;background:${o.c}"></div></div>
  </div>`).join('')}</div>
  <div class="slabel">BADGES DÉBLOQUÉS</div>
  <div style="margin-bottom:16px">${bdone.length>0?bdone.map(b=>`<span class="badge">${b}</span>`).join(''):'<span style="font-size:12px;color:var(--text3);font-family:\'DM Mono\',monospace">Aucun badge encore — commence ta routine !</span>'}</div>
  <div class="slabel">PROCHAINS BADGES</div>
  <div class="card">${bnext.length>0?bnext.map((b,i)=>`<div class="next-badge"${i===bnext.length-1?' style="border:none;margin:0;padding:0"':''}>
    <span style="font-size:20px;width:32px;text-align:center">${b.ic}</span>
    <div style="flex:1">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:13px;font-weight:500">${b.l}</span><span style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace">${b.p}</span></div>
      <div class="xpbar"><div class="xpfill" style="width:${b.pct}%;background:#B8A0F8"></div></div>
    </div>
  </div>`).join(''):'<div style="font-size:12px;color:var(--accent);text-align:center;padding:8px;font-family:\'DM Mono\',monospace">🏆 TOUS LES BADGES DÉBLOQUÉS !</div>'}</div>
  <div style="margin-top:32px;padding-top:20px;border-top:0.5px solid var(--border)">
    <div class="slabel">COMPTE</div>
    ${ST.email?`<div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:10px">📧 ${ST.email}</div>`:''}
    ${_resetStep===0
      ? `<button onclick="resetAccount()" style="width:100%;padding:12px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);color:var(--text3);font-size:11px;cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:.05em">
          🗑 RÉINITIALISER MON COMPTE
        </button>`
      : `<div style="background:rgba(240,96,128,.08);border:1px solid rgba(240,96,128,.3);border-radius:var(--r2);padding:16px;text-align:center">
          <div style="font-size:13px;font-weight:600;color:#F06080;margin-bottom:8px">⚠ Toutes tes données seront effacées</div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:16px;font-family:'DM Mono',monospace">XP, poids, streak, modules, routine…<br>Cette action est irréversible.</div>
          <div style="display:flex;gap:8px">
            <button onclick="_resetStep=0;renderDash()" style="flex:1;padding:10px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);color:var(--text2);font-size:11px;cursor:pointer;font-family:'DM Mono',monospace">ANNULER</button>
            <button onclick="resetAccount()" style="flex:1;padding:10px;background:#F06080;border:none;border-radius:var(--r);color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace">CONFIRMER ✓</button>
          </div>
        </div>`
    }
  </div>`
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function nav(id,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'))
  document.getElementById('s-'+id).classList.add('active')
  btn.classList.add('on')
  ST.screen=id
  if(id!=='module'){ST.modId=null;ST.editMod=false}
  r()
}
function openMod(id){
  ST.modId=id;ST.editMod=false
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'))
  document.getElementById('s-module').classList.add('active')
  document.querySelectorAll('.nb')[0].classList.add('on')
  ST.screen='module'
  r()
}
function goBack(){
  ST.modId=null;ST.editMod=false;ST.screen='home'
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'))
  document.getElementById('s-home').classList.add('active')
  document.querySelectorAll('.nb')[0].classList.add('on')
  r()
}
function togChk(modId,idx){ST.checks[`${modId}_${idx}`]=!ST.checks[`${modId}_${idx}`];persist();r()}
function toggleWater(i){ST.waters[i]=!ST.waters[i];persist();r()}
function togRC(tab,i){ST.rchecks[`${tab}_${i}`]=!ST.rchecks[`${tab}_${i}`];persist();r()}
function setRTab(t){ST.routineTab=t;ST.editRout=false;r()}
function togEditMod(){ST.editMod=!ST.editMod;r()}
function togEditRout(){ST.editRout=!ST.editRout;r()}
function togMuscle(id){ST.openMuscle=ST.openMuscle===id?null:id;r()}
function setAlimTab(t){ST.alimTab=t;r()}
function togCourse(key){ST.courses[key]=!ST.courses[key];persist();r()}
function addCourseItem(ci){
  const ni=document.getElementById(`ci-name-${ci}`),qi=document.getElementById(`ci-qty-${ci}`)
  const name=(ni?ni.value:'').trim(),qty=(qi?qi.value:'').trim()
  if(!name)return
  ST.coursesData[ci].items.push({n:name,q:qty,w:''})
  if(ni)ni.value='';if(qi)qi.value=''
  persist();r()
}
function delCourseItem(ci,ii){
  ST.coursesData[ci].items.splice(ii,1)
  // Efface les checks de cette catégorie (indices décalés)
  Object.keys(ST.courses).filter(k=>k.startsWith(`${ci}-`)).forEach(k=>delete ST.courses[k])
  persist();r()
}
let _resetStep=0
function resetAccount(){
  if(_resetStep===0){_resetStep=1;renderDash();return}
  // Efface toutes les clés v3_
  for(let i=localStorage.length-1;i>=0;i--){
    const k=localStorage.key(i);if(k&&k.startsWith('v3_'))localStorage.removeItem(k)
  }
  localStorage.removeItem('v3_dark')
  window.location.reload()
}
function toggleTheme(){
  isDark=!isDark;sv('v3_dark',isDark)
  document.documentElement.classList.toggle('light',!isDark)
  r()
}
function togExo(gid,name,s,rep,tip){
  const idx=ST.sportDone.findIndex(e=>e.n===name)
  if(idx>=0)ST.sportDone.splice(idx,1)
  else if(ST.sportDone.length<8)ST.sportDone.push({n:name,s,r:rep,tip,gid})
  persist();r()
}
function rmExo(name){ST.sportDone=ST.sportDone.filter(e=>e.n!==name);persist();r()}
function launchSport(){
  ST.sportHist[tk]=[...new Set(ST.sportDone.map(e=>e.gid))]
  ST.sportStarted=true;persist()
  startFreshTimer()
}
function updChk(modId,idx,val){const m=ST.mods.find(x=>x.id===modId);if(m)m.checks[idx]=val;persist()}
function delChk(modId,idx){const m=ST.mods.find(x=>x.id===modId);if(m){m.checks.splice(idx,1);m.xps.splice(idx,1)}persist();r()}
function addChk(modId){const m=ST.mods.find(x=>x.id===modId);if(m){m.checks.push('Nouvelle tâche');m.xps.push(10)}persist();r()}
function updRout(key,idx,field,val){const arr=ST.routine[key];if(arr)arr[idx]={...arr[idx],[field]:field==='xp'?parseInt(val)||0:val};persist()}
function delRout(key,idx){ST.routine[key].splice(idx,1);persist();r()}
function addRout(key){ST.routine[key].push({time:'00h00',label:'Nouvelle étape',note:'',xp:10});persist();r()}
function saveWeight(){
  const inp=document.getElementById('w-in'),v=parseFloat(inp.value)
  if(isNaN(v)||v<30||v>300)return
  const date=new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})
  ST.weights.push({v,date});if(ST.weights.length>60)ST.weights.shift()
  persist();r()
}
function toggleNail(i){
  ST.nailStreak.days=ST.nailStreak.days||{}
  ST.nailStreak.days[i]=!ST.nailStreak.days[i]
  ST.nailStreak.count=Object.values(ST.nailStreak.days).filter(Boolean).length
  persist();r()
}
function togNotif(key){
  ST.notifs[key].on=!ST.notifs[key].on
  if(ST.notifs[key].on)requestNotifs()
  persist();r()
}
function updNotif(key,field,val){ST.notifs[key][field]=val;persist()}
function copyCourses(){
  const lines=['📋 LISTE DE COURSES — Vision.\n']
  ST.coursesData.forEach((cat,ci)=>{
    const checked=cat.items.filter((_,ii)=>ST.courses[`${ci}-${ii}`])
    if(checked.length){lines.push(`\n${cat.cat.toUpperCase()}`);checked.forEach(it=>lines.push(`☐ ${it.n}${it.q?' — '+it.q:''}`))}
  })
  lines.push(`\nGénéré le ${new Date().toLocaleDateString('fr-FR')} · Vision.`)
  const txt=lines.join('\n')
  navigator.clipboard.writeText(txt).then(()=>{
    const b=document.getElementById('copy-btn');if(b){b.textContent='✓ COPIÉ — COLLE DANS TES NOTES';b.classList.add('copied')}
  }).catch(()=>{
    const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta)
    const b=document.getElementById('copy-btn');if(b){b.textContent='✓ COPIÉ !';b.classList.add('copied')}
  })
}
// Save today's score to history
function saveDayScore(){ST.scores[tk]=xpToday();persist()}
// Total XP cumulé sur tous les jours
function computeTotalXp(){return Object.values(ST.scores).reduce((a,v)=>a+v,0)}

function r(){
  saveDayScore()
  const s=ST.screen||'home'
  if(s==='home')renderHome()
  else if(s==='module')renderModule()
  else if(s==='routine')renderRoutine()
  else if(s==='sport')renderSport()
  else if(s==='alim')renderAlim()
  else if(s==='hist')renderHist()
  else if(s==='dash')renderDash()
  persist()
}

// Init
checkOnboard()
// Démarre l'interval de notifications si permission déjà accordée (session précédente)
if(typeof Notification!=='undefined'&&Notification.permission==='granted')_startNotifInterval()
// Vérifie le popup ongles au focus de la fenêtre (retour après notification)
document.addEventListener('visibilitychange',()=>{if(!document.hidden)checkNailPopup()})
r()
// Vérifie au chargement initial aussi
setTimeout(checkNailPopup,500)
</script>
